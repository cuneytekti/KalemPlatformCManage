<!doctype html>
<html lang="az">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Ödəniş nəticəsi — Kalem Platform</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .result { max-width: 560px; margin: 80px auto; text-align: center; padding: 32px; }
    .result .icon { font-size: 56px; }
    .result h1 { margin: 12px 0 8px; font-size: 26px; }
    .result p { color: #555; line-height: 1.6; }
  </style>
</head>
<body>
  <main class="result card">
    <div class="icon" id="r-icon"></div>
    <h1 id="r-title"></h1>
    <p id="r-text"></p>
    <p><a class="btn btn-primary" href="/">Kalem Platform</a></p>
  </main>
  <script>
    'use strict';
    var M = {
      ugur: {
        icon: '✅',
        title: 'Ödəniş uğurla tamamlandı',
        text: 'Mühitiniz avtomatik qurulur (bir neçə dəqiqə çəkir). Giriş ünvanı və müvəqqəti şifrə e-poçtunuza göndərildi. İlk girişdə şifrənizi mütləq dəyişin.'
      },
      imtina: {
        icon: '❌',
        title: 'Ödəniş təsdiqlənmədi',
        text: 'Bank əməliyyatı təsdiqləmədi. Kartınızı yoxlayıb yenidən cəhd edin və ya bizimlə əlaqə saxlayın: info@kalemyazilim.az · 012 526 22 22'
      },
      xeta: {
        icon: '⚠️',
        title: 'Gözlənilməz xəta',
        text: 'Əməliyyat zamanı xəta baş verdi. Kartınızdan vəsait çıxıbsa, narahat olmayın — komandamız yoxlayıb sizinlə əlaqə saxlayacaq: info@kalemyazilim.az'
      }
    };
    var k = new URLSearchParams(location.search).get('netice');
    var m = M[k] || M.xeta;
    document.getElementById('r-icon').textContent = m.icon;
    document.getElementById('r-title').textContent = m.title;
    document.getElementById('r-text').textContent = m.text;
  </script>
</body>
</html>
