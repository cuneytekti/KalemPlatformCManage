# CManage CI: backend test+build, frontend typecheck+build, imaj build kontrolü
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  api:
    name: API (test + build)
    runs-on: ubuntu-latest
    defaults:
      run: { working-directory: api }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  web:
    name: Web (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --prefix web
      - run: npm run build --prefix web

  docker:
    name: Docker imaj build kontrolü
    runs-on: ubuntu-latest
    needs: [api, web]
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: API imajı
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: false
          cache-from: type=gha,scope=cmanage-api
          cache-to: type=gha,scope=cmanage-api,mode=max
      - name: Web imajı
        uses: docker/build-push-action@v6
        with:
          context: ./web
          push: false
          cache-from: type=gha,scope=cmanage-web
          cache-to: type=gha,scope=cmanage-web,mode=max
